<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="paper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F0F5"/>
    </linearGradient>
    <linearGradient id="node-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="inner-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Subtle highlight on top -->
  <rect x="0" y="0" width="1024" height="512" rx="220" ry="220" fill="white" opacity="0.08"/>

  <!-- Plan document (clipboard shape) -->
  <g filter="shadow" transform="translate(240, 140)">
    <!-- Clipboard body -->
    <rect x="0" y="60" width="400" height="520" rx="32" ry="32" fill="url(#paper)"/>
    <!-- Clipboard clip -->
    <rect x="130" y="30" width="140" height="60" rx="16" ry="16" fill="#CBD5E1"/>
    <rect x="150" y="20" width="100" height="40" rx="12" ry="12" fill="#94A3B8"/>

    <!-- Plan lines (checklist) -->
    <!-- Line 1 - checked -->
    <rect x="50" y="140" width="28" height="28" rx="6" fill="#6366F1"/>
    <polyline points="56,155 63,163 78,148" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="100" y="145" width="200" height="16" rx="8" fill="#CBD5E1"/>

    <!-- Line 2 - checked -->
    <rect x="50" y="200" width="28" height="28" rx="6" fill="#6366F1"/>
    <polyline points="56,215 63,223 78,208" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="100" y="205" width="160" height="16" rx="8" fill="#CBD5E1"/>

    <!-- Line 3 - unchecked (in progress) -->
    <rect x="50" y="260" width="28" height="28" rx="6" fill="none" stroke="#A78BFA" stroke-width="3"/>
    <rect x="100" y="265" width="240" height="16" rx="8" fill="#E2E8F0"/>

    <!-- Line 4 - unchecked -->
    <rect x="50" y="320" width="28" height="28" rx="6" fill="none" stroke="#D1D5DB" stroke-width="3"/>
    <rect x="100" y="325" width="180" height="16" rx="8" fill="#E2E8F0"/>
  </g>

  <!-- Agent network nodes (bottom right) -->
  <g transform="translate(560, 580)">
    <!-- Connection lines -->
    <line x1="100" y1="60" x2="220" y2="140" stroke="#C4B5FD" stroke-width="5" opacity="0.8"/>
    <line x1="100" y1="60" x2="60" y2="200" stroke="#C4B5FD" stroke-width="5" opacity="0.8"/>
    <line x1="220" y1="140" x2="60" y2="200" stroke="#C4B5FD" stroke-width="5" opacity="0.6"/>
    <line x1="220" y1="140" x2="320" y2="260" stroke="#C4B5FD" stroke-width="5" opacity="0.5"/>
    <line x1="60" y1="200" x2="180" y2="310" stroke="#C4B5FD" stroke-width="5" opacity="0.5"/>

    <!-- Main node (agent) -->
    <circle cx="100" cy="60" r="36" fill="url(#node-grad)" filter="inner-shadow"/>
    <circle cx="100" cy="48" r="10" fill="white" opacity="0.9"/>
    <rect x="84" y="62" width="32" height="18" rx="8" fill="white" opacity="0.9"/>

    <!-- Secondary nodes -->
    <circle cx="220" cy="140" r="28" fill="#A78BFA"/>
    <circle cx="220" cy="130" r="8" fill="white" opacity="0.85"/>
    <rect x="207" y="141" width="26" height="14" rx="6" fill="white" opacity="0.85"/>

    <circle cx="60" cy="200" r="28" fill="#A78BFA"/>
    <circle cx="60" cy="190" r="8" fill="white" opacity="0.85"/>
    <rect x="47" y="201" width="26" height="14" rx="6" fill="white" opacity="0.85"/>

    <!-- Smaller distant nodes -->
    <circle cx="320" cy="260" r="18" fill="#C4B5FD" opacity="0.7"/>
    <circle cx="180" cy="310" r="18" fill="#C4B5FD" opacity="0.7"/>
  </g>
</svg>
